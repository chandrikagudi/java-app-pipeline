version: 0.2

env:
  variables:
    IMAGE_NAME: java-app

phases:
  pre_build:
    commands:
      - aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 042501517500.dkr.ecr.ap-south-1.amazonaws.com

  build:
    commands:
      - docker build -t java-app .
      - docker tag java-app:latest 042501517500.dkr.ecr.ap-south-1.amazonaws.com/java-app

  post_build:
    commands:
      - docker push 042501517500.dkr.ecr.ap-south-1.amazonaws.com/java-app
